<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ladoo's Corner · A Coffee Table Letter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Parisienne&display=swap" rel="stylesheet">
<style>
  :root{
    /* dark walnut, moody pool of light — matched to the reference */
    --wood-edge:#120a05;
    --wood-1:#22130a;
    --wood-2:#341f12;
    --wood-3:#46291693;
    --wood-hi:#6b4226;
    /* warm kraft napkin */
    --kraft:#f4efe5;
    --kraft-2:#e9e1d1;
    --kraft-3:#d8ccb6;
    --kraft-shadow:#b0a487;
    --ink:#2c1c0f;
    --ink-soft:#4a3320;
    --coffee:#241308;
    --coffee-dark:#0c0602;
    --crema:#6b4a2c;
    --gold:#cBA45c;
    --candle:#ffb24d;
    --cream-ui:#ecdcbd;
    --ceramic:#e9ddc6;
    --ceramic-2:#cdbe9f;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:#0c0703}
  body{font-family:'Cormorant Garamond',serif;color:var(--cream-ui);
    -webkit-font-smoothing:antialiased;cursor:default}
  .noselect{user-select:none;-webkit-user-select:none}

  /* ===================== STAGE ===================== */
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden}

  .table-bg{
    position:absolute;inset:-10%;
    background:
      radial-gradient(95% 80% at 50% 44%, rgba(150,96,52,.55), rgba(40,22,10,.2) 52%, rgba(0,0,0,0) 74%),
      repeating-linear-gradient(94deg,
        var(--wood-2) 0px, var(--wood-1) 9px, var(--wood-2) 17px,
        var(--wood-edge) 26px, var(--wood-2) 35px, var(--wood-1) 46px),
      linear-gradient(120deg,var(--wood-edge),var(--wood-2) 50%,var(--wood-1));
    background-blend-mode:soft-light,normal,normal;will-change:transform;
  }
  .table-bg::after{content:"";position:absolute;inset:0;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='260' height='260'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.011 0.18' numOctaves='5' seed='9'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.7'/></svg>");
    mix-blend-mode:overlay;opacity:.55}

  .layer{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);will-change:transform}
  .stage-fit{position:relative;width:min(96vmin,860px);height:min(96vmin,860px)}

  /* ---------- candle glow ---------- */
  .candle-glow{position:absolute;left:-10%;bottom:-8%;width:60%;height:60%;
    background:radial-gradient(circle, rgba(255,176,80,.5), rgba(255,150,60,.16) 42%, rgba(0,0,0,0) 70%);
    filter:blur(10px);mix-blend-mode:screen;animation:flicker 5s ease-in-out infinite;pointer-events:none}
  @keyframes flicker{0%,100%{opacity:.8;transform:scale(1)}30%{opacity:1;transform:scale(1.04)}55%{opacity:.66;transform:scale(.98)}78%{opacity:.92;transform:scale(1.02)}}

  /* ---------- coffee MUG (top-left, cropped) ---------- */
  .mug-wrap{position:absolute;left:-4%;top:-6%;width:36%;height:36%}
  .mug-handle{position:absolute;left:-12%;top:34%;width:30%;height:34%;
    border:13px solid #ddd0b6;border-radius:50%;border-right-color:transparent;border-top-color:transparent;
    transform:rotate(-18deg);box-shadow:0 10px 16px rgba(0,0,0,.4)}
  .mug{position:absolute;inset:8%;border-radius:50%;
    background:radial-gradient(circle at 42% 36%, #f1e7d2, #ddd0b6 58%, #b9a883 84%, #9c8a64);
    box-shadow:0 30px 50px rgba(0,0,0,.55),0 12px 20px rgba(0,0,0,.45),
      inset 0 0 0 8px rgba(255,255,255,.16),inset 0 -12px 26px rgba(110,86,52,.45)}
  .mug::after{content:"";position:absolute;inset:0;border-radius:50%;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='sp'><feTurbulence type='turbulence' baseFrequency='0.9' numOctaves='2' seed='4'/><feColorMatrix type='matrix' values='0 0 0 0 0.2  0 0 0 0 0.13  0 0 0 0 0.06  0 0 0 9 -4'/></filter><rect width='100%25' height='100%25' filter='url(%23sp)'/></svg>");
    opacity:.3;mix-blend-mode:multiply}
  .coffee{position:absolute;inset:20%;border-radius:50%;overflow:hidden;
    background:
      radial-gradient(38% 20% at 33% 23%, rgba(255,238,208,.55), rgba(255,238,208,0) 72%),
      radial-gradient(circle at 62% 30%, rgba(120,82,48,.5), rgba(0,0,0,0) 36%),
      radial-gradient(circle at 42% 64%, var(--crema), var(--coffee) 46%, var(--coffee-dark) 90%);
    box-shadow:inset 0 0 30px rgba(0,0,0,.85),inset 0 7px 12px rgba(0,0,0,.6)}
  .coffee::before{content:"";position:absolute;inset:0;border-radius:50%;
    box-shadow:inset 0 0 0 6px rgba(120,84,48,.35)}
  .coffee::after{content:"";position:absolute;left:50%;top:50%;width:150%;height:150%;transform:translate(-50%,-50%);
    background:conic-gradient(from 0deg, rgba(150,100,58,0),rgba(170,116,70,.28),rgba(90,56,30,0) 55%);
    animation:swirl 22s linear infinite}
  @keyframes swirl{to{transform:translate(-50%,-50%) rotate(360deg)}}
  .foam{position:absolute;inset:20%;border-radius:50%;pointer-events:none;
    background-image:
      radial-gradient(circle at 30% 28%, rgba(180,140,96,.6) 0 2px, transparent 3px),
      radial-gradient(circle at 70% 34%, rgba(180,140,96,.5) 0 1.5px, transparent 3px),
      radial-gradient(circle at 60% 70%, rgba(170,130,88,.5) 0 1.6px, transparent 3px),
      radial-gradient(circle at 38% 66%, rgba(180,140,96,.45) 0 1.4px, transparent 3px);
    opacity:.85}

  /* wispy steam */
  .steam{position:absolute;left:46%;top:-44%;width:60%;height:120%;pointer-events:none;z-index:6;
    filter:blur(5px) brightness(1.15);mix-blend-mode:screen;opacity:0;transition:opacity 2.6s ease 1s;
    transform-origin:bottom center;animation:steamWind 8s ease-in-out infinite}
  @keyframes steamWind{0%{transform:translateX(0) skewX(0deg) scaleY(1)}40%{transform:translateX(15%) skewX(-16deg) scaleY(1.08)}68%{transform:translateX(7%) skewX(-7deg) scaleY(1.03)}100%{transform:translateX(0) skewX(0deg) scaleY(1)}}
  .steam.on{opacity:.55}
  .steam svg{width:100%;height:100%;overflow:visible}
  .steam path{fill:none;stroke:rgba(245,240,232,.55);stroke-width:9;stroke-linecap:round;
    stroke-dasharray:8 220;animation:smoke 7s linear infinite}
  .steam path:nth-child(2){animation-delay:2.3s;stroke-width:7;opacity:.8}
  .steam path:nth-child(3){animation-delay:4.4s;stroke-width:6;opacity:.7}
  @keyframes smoke{0%{stroke-dashoffset:230;opacity:0}15%{opacity:.7}100%{stroke-dashoffset:-30;opacity:0}}

  /* ---------- PLATE + brownies (top-right, cropped) ---------- */
  .plate{position:absolute;left:66%;top:-12%;width:50%;height:50%;border-radius:50%;
    background:radial-gradient(circle at 44% 40%, var(--ceramic), #ddceb1 56%, var(--ceramic-2) 80%, #b09c78 100%);
    box-shadow:0 30px 52px rgba(0,0,0,.55),0 12px 20px rgba(0,0,0,.45),
      inset 0 0 0 7px rgba(255,255,255,.14),inset 0 -12px 30px rgba(120,98,62,.4)}
  .plate::before{content:"";position:absolute;inset:13%;border-radius:50%;box-shadow:inset 0 0 22px rgba(140,112,72,.45)}
  .plate::after{content:"";position:absolute;inset:0;border-radius:50%;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='ps'><feTurbulence type='turbulence' baseFrequency='0.8' numOctaves='2' seed='6'/><feColorMatrix type='matrix' values='0 0 0 0 0.25  0 0 0 0 0.16  0 0 0 0 0.07  0 0 0 8 -3.4'/></filter><rect width='100%25' height='100%25' filter='url(%23ps)'/></svg>");
    opacity:.32;mix-blend-mode:multiply}
  .brownie{position:absolute;border-radius:16% 14% 18% 13%/16% 18% 13% 17%;
    background:
      radial-gradient(58% 42% at 40% 26%, rgba(155,98,54,.42), rgba(0,0,0,0) 62%),
      linear-gradient(150deg,#42261580,#2a160c 56%,#130905);
    box-shadow:0 20px 26px rgba(0,0,0,.6),0 7px 11px rgba(0,0,0,.5),
      inset 0 3px 4px rgba(155,96,52,.55),inset 0 -10px 15px rgba(0,0,0,.72)}
  .brownie::after{content:"";position:absolute;inset:0;border-radius:inherit;
    background-image:
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'><filter id='cr'><feTurbulence type='fractalNoise' baseFrequency='0.45 0.5' numOctaves='3' seed='2'/><feColorMatrix type='matrix' values='0 0 0 0 0.46  0 0 0 0 0.28  0 0 0 0 0.14  0 0 0 6 -2.6'/></filter><rect width='100%25' height='100%25' filter='url(%23cr)'/></svg>");
    opacity:.7;mix-blend-mode:screen}
  .brownie::before{content:"";position:absolute;inset:8%;border-radius:inherit;
    background:
      linear-gradient(60deg, transparent 46%, rgba(20,10,5,.7) 47%, transparent 49%),
      linear-gradient(-30deg, transparent 60%, rgba(20,10,5,.6) 61%, transparent 63%);
    mix-blend-mode:multiply;opacity:.6}
  .b1{width:19%;height:17%;left:74%;top:14%;transform:rotate(-6deg)}
  .b2{width:18%;height:16%;left:86%;top:24%;transform:rotate(9deg)}
  .b3{width:15%;height:13%;left:80%;top:6%;transform:rotate(-2deg)}
  .crumb{position:absolute;background:#22110a;border-radius:42%;box-shadow:0 2px 2px rgba(0,0,0,.5);opacity:.9}

  /* ---------- dried roses (bottom-left) ---------- */
  .sprig{position:absolute;left:-6%;bottom:-4%;width:34%;height:46%;
    opacity:.95;filter:drop-shadow(0 8px 10px rgba(0,0,0,.45));
    transform-origin:30% 100%;animation:sway 6.5s ease-in-out infinite}
  @keyframes sway{0%,100%{transform:rotate(-6deg)}30%{transform:rotate(-1deg)}50%{transform:rotate(-9deg)}72%{transform:rotate(-3deg)}}

  /* ---------- pen (right) ---------- */
  .pen{position:absolute;right:-2%;top:38%;width:9%;height:54%;
    transform:rotate(13deg);filter:drop-shadow(0 12px 14px rgba(0,0,0,.5))}

  /* ---------- iPod (front view, next to napkin) ---------- */
  .ipod{position:absolute;left:82%;top:60%;width:15%;height:28%;
    transform:translate(-50%,-50%) rotate(-4deg);
    filter:drop-shadow(0 18px 26px rgba(0,0,0,.55));z-index:5}
  .ipod-body{position:absolute;inset:0;border-radius:14%/7%;
    background:linear-gradient(160deg,#fbfcff 0%,#e7e9ef 48%,#c9ccd5 100%);
    box-shadow:inset 0 1px 2px rgba(255,255,255,.95),
               inset 0 -3px 7px rgba(0,0,0,.14),
               0 0 0 1px rgba(170,172,182,.55)}
  .ipod-screen{position:absolute;left:9%;top:6%;right:9%;height:50%;
    border-radius:5px;
    background:linear-gradient(180deg,#0d1f3a 0%,#163058 55%,#0a1a32 100%);
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.6),inset 0 2px 4px rgba(0,0,0,.55),
               inset 0 -1px 2px rgba(120,170,220,.18);
    color:#d4e9ff;font-family:'Cormorant Garamond',serif;
    padding:6% 7% 7%;overflow:hidden;display:flex;flex-direction:column;gap:3%}
  .ipod-bar{font-size:.52em;display:flex;justify-content:space-between;align-items:center;
    border-bottom:1px solid rgba(200,230,255,.28);padding-bottom:3%;opacity:.88;letter-spacing:.04em}
  .ipod-bar .play-tri{color:#ffd693;font-size:1.1em;line-height:1}
  .ipod-bar .batt{display:inline-block;width:14px;height:7px;border:1px solid #c8e7ff;border-radius:1px;position:relative}
  .ipod-bar .batt::after{content:"";position:absolute;left:1px;top:1px;bottom:1px;width:78%;background:#c8e7ff;border-radius:1px}
  .ipod-bar .batt::before{content:"";position:absolute;right:-3px;top:1px;width:2px;height:3px;background:#c8e7ff;border-radius:0 1px 1px 0}
  .ipod-info{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5%;text-align:center}
  .ipod-art{font-size:1.7em;line-height:1;color:#ffd693;text-shadow:0 0 10px rgba(255,210,140,.7);margin-bottom:1%}
  .ipod-title{font-size:.62em;font-weight:600;line-height:1.1;letter-spacing:.02em}
  .ipod-artist{font-size:.5em;opacity:.72;font-style:italic}
  .ipod-eq{display:flex;gap:5%;height:14%;align-items:flex-end;margin-top:2%}
  .ipod-eq i{display:block;flex:1;min-width:2px;background:linear-gradient(180deg,#fff2d6,#ffd693);border-radius:1px;
    transform-origin:bottom;animation:eqBar 0.9s ease-in-out infinite}
  .ipod-eq i:nth-child(1){animation-delay:0s;height:60%}
  .ipod-eq i:nth-child(2){animation-delay:.12s;height:90%}
  .ipod-eq i:nth-child(3){animation-delay:.22s;height:42%}
  .ipod-eq i:nth-child(4){animation-delay:.16s;height:78%}
  .ipod-eq i:nth-child(5){animation-delay:.28s;height:55%}
  .ipod-eq i:nth-child(6){animation-delay:.06s;height:88%}
  .ipod-eq i:nth-child(7){animation-delay:.2s;height:50%}
  @keyframes eqBar{0%,100%{transform:scaleY(.35)}50%{transform:scaleY(1)}}
  .ipod-progress{width:100%;height:5%;background:rgba(200,230,255,.18);border-radius:2px;overflow:hidden;margin-top:2%}
  .ipod-progress-fill{height:100%;background:linear-gradient(90deg,#ffd693,#fff2d6);width:0%;
    animation:progFill 220s linear forwards}
  @keyframes progFill{to{width:100%}}
  .ipod-wheel{position:absolute;left:50%;bottom:5%;width:74%;aspect-ratio:1/1;
    transform:translateX(-50%);border-radius:50%;
    background:radial-gradient(circle at 50% 35%,#eef0f5,#cfd2da 75%,#b8bcc6);
    box-shadow:inset 0 2px 5px rgba(0,0,0,.18),inset 0 -2px 4px rgba(255,255,255,.7),
               0 1px 0 rgba(0,0,0,.08)}
  .ipod-wheel-label,.ipod-wheel-icon{position:absolute;font-family:'Cormorant Garamond',serif;color:#7a7d85;line-height:1;user-select:none}
  .ipod-wheel-label{font-size:.5em;font-weight:600;letter-spacing:.12em;left:50%;transform:translateX(-50%);top:10%}
  .ipod-wheel-icon{font-size:.58em}
  .ipod-wheel-icon.prev{left:9%;top:50%;transform:translateY(-50%)}
  .ipod-wheel-icon.next{right:9%;top:50%;transform:translateY(-50%)}
  .ipod-wheel-icon.play{left:50%;bottom:10%;transform:translateX(-50%)}
  .ipod-center{position:absolute;left:50%;top:50%;width:36%;aspect-ratio:1/1;
    transform:translate(-50%,-50%);border-radius:50%;
    background:radial-gradient(circle at 38% 32%,#fff,#dadce4);
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.06),
               inset 0 -3px 5px rgba(0,0,0,.12),
               0 1px 2px rgba(0,0,0,.18)}
  .ipod-glow{position:absolute;left:-12%;top:-10%;width:124%;height:120%;border-radius:18%/9%;pointer-events:none;
    background:radial-gradient(60% 50% at 50% 40%,rgba(255,210,140,.25),rgba(255,210,140,0) 70%);
    mix-blend-mode:screen;opacity:.7}

  /* ---------- coffee ring stains ---------- */
  .ring-stain{position:absolute;border-radius:50%;border:4px solid rgba(96,58,30,.4);
    box-shadow:inset 0 0 14px rgba(80,46,22,.28);filter:blur(.5px);opacity:.7}

  /* ===================== NAPKIN ===================== */
  .napkin-stack{position:absolute;left:50%;top:51%;width:54%;height:78%;
    transform:translate(-50%,-50%) rotate(-1.4deg)}
  .napkin-under{position:absolute;inset:0;border-radius:5px;transform:translate(10px,16px) rotate(1.6deg);
    background:linear-gradient(180deg,var(--kraft-2),var(--kraft-3));
    box-shadow:0 26px 44px rgba(0,0,0,.5);animation:underSway 9s ease-in-out infinite}
  @keyframes underSway{0%,100%{transform:translate(10px,16px) rotate(1.6deg)}50%{transform:translate(12px,15px) rotate(2deg)}}
  .napkin{position:absolute;inset:0;border-radius:5px;overflow:hidden;
    transform-origin:46% 94%;will-change:transform;
    background:
      linear-gradient(118deg, rgba(255,255,255,.05), rgba(0,0,0,.07)),
      linear-gradient(176deg,var(--kraft),var(--kraft-2) 70%,var(--kraft-3));
    box-shadow:0 30px 52px rgba(0,0,0,.5),0 12px 20px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.4);
    animation:napkinWind 8s ease-in-out infinite}
  @keyframes napkinWind{
    0%{transform:translateY(0) rotate(0deg) skewX(0deg);box-shadow:0 30px 52px rgba(0,0,0,.5),0 12px 20px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.4)}
    16%{transform:translateY(-6px) rotate(-.8deg) skewX(-1deg)}
    30%{transform:translateY(-2px) rotate(.5deg) skewX(.6deg)}
    44%{transform:translateY(-12px) rotate(-1.4deg) skewX(-1.5deg);box-shadow:0 54px 76px rgba(0,0,0,.5),0 22px 34px rgba(0,0,0,.42),inset 0 1px 0 rgba(255,255,255,.5)}
    60%{transform:translateY(-4px) rotate(.4deg) skewX(.5deg)}
    74%{transform:translateY(-8px) rotate(-1deg) skewX(-1deg)}
    88%{transform:translateY(-2px) rotate(.6deg) skewX(.4deg)}
    100%{transform:translateY(0) rotate(0deg) skewX(0deg);box-shadow:0 30px 52px rgba(0,0,0,.5),0 12px 20px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.4)}}
  .napkin-sheen{position:absolute;inset:0;border-radius:5px;pointer-events:none;z-index:1;
    background:linear-gradient(115deg, transparent 34%, rgba(255,240,205,.09) 48%, transparent 60%);
    mix-blend-mode:soft-light;animation:napkinSheen 8s ease-in-out infinite}

  .napkin::after{content:"";position:absolute;inset:0;pointer-events:none;
    background:
      radial-gradient(120% 90% at 46% 36%, rgba(255,214,158,.12), rgba(0,0,0,0) 62%),
      conic-gradient(from 0deg at 50% 50%, rgba(255,255,255,.05) 0 90deg, rgba(0,0,0,.05) 90deg 180deg, rgba(255,255,255,.03) 180deg 270deg, rgba(0,0,0,.055) 270deg 360deg),
      linear-gradient(90deg, transparent 46%, rgba(110,86,52,.10) 49%, rgba(82,60,34,.18) 50%, rgba(110,86,52,.10) 51%, rgba(255,250,240,.18) 52.5%, transparent 56%),
      linear-gradient(180deg, transparent 44%, rgba(110,86,52,.09) 48.5%, rgba(82,60,34,.16) 50%, rgba(110,86,52,.09) 51.5%, rgba(255,250,240,.15) 53%, transparent 57%),
      linear-gradient(90deg, transparent 22%, rgba(82,60,34,.07) 25%, rgba(255,250,240,.08) 26.5%, transparent 29%),
      linear-gradient(90deg, transparent 71%, rgba(82,60,34,.07) 75%, rgba(255,250,240,.08) 76.5%, transparent 79%),
      linear-gradient(180deg, transparent 22%, rgba(82,60,34,.06) 25%, rgba(255,250,240,.07) 26.5%, transparent 29%),

  /* coffee ring printed on the napkin (lower-right, like the reference) */
  .napkin-ring{position:absolute;right:9%;bottom:11%;width:34%;height:34%;border-radius:50%;
    border:6px solid rgba(120,76,38,.42);
    box-shadow:inset 0 0 16px rgba(110,68,34,.3), 0 0 8px rgba(110,68,34,.12);
    background:radial-gradient(circle, rgba(140,92,48,.06), transparent 62%);
    filter:blur(.4px);opacity:.78;transform:rotate(-6deg);pointer-events:none;mix-blend-mode:multiply}

  /* ---------- café logo (line-art window) ---------- */
  .logo{position:absolute;right:6%;top:5%;width:26%;text-align:right;z-index:3}
  .mark-img{width:100%;height:auto;display:block;opacity:.8;
    filter:blur(.12px) contrast(1.04) sepia(.12);mix-blend-mode:multiply}

  /* ---------- letter ---------- */
  .letter{position:absolute;left:50%;top:25%;width:90%;transform:translateX(-50%);z-index:3;
    text-align:center;color:var(--ink);font-family:'Caveat',cursive;line-height:1.18}
  .lrow{display:block;text-align:center}
  .lwrap{position:relative;display:inline-block;margin:0 auto;max-width:100%}
  .line{display:inline-block;position:relative;white-space:nowrap;clip-path:inset(0 100% 0 -4%)}
  .line.write{animation:inkwipe var(--dur,1.8s) cubic-bezier(.45,.05,.55,1) forwards}
  @keyframes inkwipe{0%{clip-path:inset(0 100% 0 -4%);filter:blur(.7px)}100%{clip-path:inset(0 -4% 0 -4%);filter:blur(0)}}
  .nib{position:absolute;top:-4%;left:0;width:0;height:0;opacity:0;pointer-events:none;z-index:3}
  .nib.go{animation:nibmove var(--dur,1.8s) cubic-bezier(.45,.05,.55,1) forwards}
  .nib .tip{position:absolute;left:-2px;top:-2px;width:6px;height:6px;border-radius:50%;
    background:radial-gradient(circle,rgba(44,28,15,.8),rgba(44,28,15,0) 72%)}
  @keyframes nibmove{0%{opacity:1;left:0}90%{opacity:1}100%{opacity:0;left:100%}}
  .l-greet{font-size:clamp(.95rem,2.5vmin,1.4rem);font-weight:600}
  .l-body{font-size:clamp(.78rem,1.95vmin,1.05rem);font-weight:500}
  .l-sign{font-size:clamp(.75rem,1.85vmin,1rem);font-weight:500}
  .letter .gap{height:clamp(3px,.75vmin,6px)}
  .heart-doodle{display:inline-block;width:20px;height:18px;vertical-align:middle;margin-left:8px;
    opacity:0;transform:scale(.4) rotate(-12deg)}
  .heart-doodle.show{animation:pop .9s cubic-bezier(.2,1.4,.4,1) forwards}
  @keyframes pop{to{opacity:.9;transform:scale(1) rotate(-8deg)}}

  /* ===================== ATMOSPHERE ===================== */
  .vignette{position:fixed;inset:0;pointer-events:none;z-index:40;
    background:radial-gradient(110% 92% at 50% 44%, rgba(0,0,0,0) 34%, rgba(0,0,0,.72) 100%)}
  .warm-cast{position:fixed;inset:0;pointer-events:none;z-index:41;mix-blend-mode:soft-light;
    background:radial-gradient(70% 56% at 24% 26%, rgba(255,176,86,.5), rgba(0,0,0,0) 60%),
               radial-gradient(70% 60% at 82% 84%, rgba(70,100,150,.16), rgba(0,0,0,0) 60%)}
  .grain{position:fixed;inset:0;pointer-events:none;z-index:44;opacity:.06;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='g'><feTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23g)'/></svg>")}
  .dof{position:fixed;inset:0;pointer-events:none;z-index:39;box-shadow:inset 0 0 170px 56px rgba(14,7,3,.6)}
  #dust{position:fixed;inset:0;pointer-events:none;z-index:42}
  .mote{position:absolute;border-radius:50%;
    background:radial-gradient(circle,rgba(255,222,162,.95),rgba(255,205,140,0) 70%);animation:drift linear infinite}
  @keyframes drift{0%{transform:translate(0,0) scale(1);opacity:0}10%{opacity:.85}90%{opacity:.5}100%{transform:translate(var(--dx),var(--dy)) scale(.6);opacity:0}}

  /* wind-blown leaves */
  #leaves{position:fixed;inset:0;pointer-events:none;z-index:43;overflow:hidden}
  .leaf{position:absolute;left:-12vw;top:var(--top);width:var(--sz);height:var(--sz);
    opacity:0;will-change:transform;filter:drop-shadow(0 4px 5px rgba(0,0,0,.45));
    animation:leafFly var(--dur) linear var(--delay) infinite}
  .leaf svg{width:100%;height:100%;display:block}
  @keyframes leafFly{
    0%{transform:translate(0,0) rotate(0deg);opacity:0}
    6%{opacity:var(--op)}
    25%{transform:translate(34vw,-7vh) rotate(170deg)}
    50%{transform:translate(62vw,6vh) rotate(330deg)}
    75%{transform:translate(90vw,-4vh) rotate(520deg)}
    94%{opacity:var(--op)}
    100%{transform:translate(128vw,5vh) rotate(700deg);opacity:0}}

  /* ===================== WELCOME ===================== */
  #welcome{position:fixed;inset:0;z-index:60;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;gap:1.1rem;padding:2rem;
    background:radial-gradient(90% 90% at 50% 40%, rgba(70,42,22,.5), rgba(0,0,0,0) 58%),
      linear-gradient(180deg, rgba(16,9,4,.84), rgba(10,6,3,.96));
    backdrop-filter:blur(8px);transition:opacity 1.4s ease, transform 1.6s cubic-bezier(.6,.02,.2,1), filter 1.4s ease}
  #welcome.hide{opacity:0;transform:scale(1.18);filter:blur(8px);pointer-events:none}
  .w-mark svg{width:clamp(60px,13vmin,108px);height:auto;filter:drop-shadow(0 6px 22px rgba(255,172,82,.35))}
  .w-logo{width:clamp(210px,48vmin,380px);height:auto;display:block;
    filter:drop-shadow(0 8px 26px rgba(255,176,84,.28))}
  .w-name{font-family:'Cormorant Garamond';font-weight:500;font-size:clamp(2.1rem,7vmin,4rem);
    letter-spacing:.18em;text-transform:uppercase;color:var(--cream-ui);line-height:1;margin-top:.5rem;
    text-shadow:0 4px 30px rgba(0,0,0,.6)}
  .w-est{display:flex;align-items:center;justify-content:center;gap:.7em;margin-top:.5rem;
    font-size:clamp(.55rem,1.5vmin,.78rem);letter-spacing:.42em;text-transform:uppercase;color:var(--gold);opacity:.9}
  .w-est span{height:1px;width:26px;background:currentColor;opacity:.6}
  .w-sub{font-family:'Parisienne',cursive;font-size:clamp(1.3rem,3.8vmin,2.1rem);color:var(--candle);opacity:.92;margin-top:.5rem}
  .w-line{font-size:clamp(.9rem,2.2vmin,1.12rem);color:#cdbfa4;opacity:.82;max-width:34ch;font-style:italic;letter-spacing:.02em;margin-top:.2rem}
  .open-btn{margin-top:.9rem;font-family:'Cormorant Garamond';font-weight:600;
    font-size:clamp(.95rem,2.4vmin,1.2rem);letter-spacing:.22em;text-transform:uppercase;color:#2a1a0e;
    background:linear-gradient(180deg,#efd6a3,#d2b06e);border:none;border-radius:999px;padding:.95em 2.4em;
    cursor:pointer;position:relative;overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.25) inset,0 0 28px rgba(255,176,84,.35);
    transition:transform .3s ease,box-shadow .3s ease;animation:btnBreath 3.6s ease-in-out infinite}
  .open-btn:hover{transform:translateY(-2px) scale(1.03);
    box-shadow:0 16px 40px rgba(0,0,0,.55),0 0 40px rgba(255,176,84,.6),0 0 0 1px rgba(255,255,255,.4) inset}
  .open-btn::after{content:"";position:absolute;top:0;left:-60%;width:40%;height:100%;
    background:linear-gradient(100deg,rgba(255,255,255,0),rgba(255,255,255,.6),rgba(255,255,255,0));
    transform:skewX(-20deg);animation:sheen 3.6s ease-in-out infinite}
  @keyframes sheen{0%,55%{left:-60%}80%,100%{left:130%}}
  @keyframes btnBreath{0%,100%{box-shadow:0 10px 30px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.25) inset,0 0 22px rgba(255,176,84,.3)}50%{box-shadow:0 12px 34px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.3) inset,0 0 36px rgba(255,176,84,.5)}}
  .w-hint{font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;color:#8c7a5c;opacity:.7;margin-top:.4rem}

  #sound{position:fixed;right:18px;bottom:16px;z-index:70;width:44px;height:44px;border-radius:50%;cursor:pointer;
    display:flex;align-items:center;justify-content:center;background:rgba(28,16,8,.55);
    border:1px solid rgba(201,164,92,.4);color:var(--gold);backdrop-filter:blur(6px);
    transition:transform .25s ease,background .25s ease;opacity:0;pointer-events:none}
  #sound.show{opacity:1;pointer-events:auto}
  #sound:hover{transform:scale(1.1);background:rgba(40,24,12,.7)}
  #sound svg{width:20px;height:20px}
  #replay{position:fixed;left:18px;bottom:16px;z-index:70;font-family:'Cormorant Garamond';
    font-size:.78rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);opacity:0;cursor:pointer;
    border-bottom:1px solid rgba(201,164,92,.4);padding-bottom:2px;transition:opacity .4s ease,color .25s ease;pointer-events:none}
  #replay.show{opacity:.7;pointer-events:auto}
  #replay:hover{opacity:1}

  @media (max-width:600px){
    .stage-fit{width:98vw;height:98vw}
    .w-line{max-width:26ch}
    .napkin-stack{width:72%;height:82%}
    .w-logo{width:clamp(150px,46vmin,210px)}
    #welcome{gap:.65rem;padding:1.2rem}
    .open-btn{padding:.85em 1.8em}
    .letter{top:22%;width:94%;line-height:1.18}
    .line{white-space:normal}
    .nib{display:none}
    .l-greet{font-size:1.05rem;font-weight:600}
    .l-body{font-size:.82rem}
    .l-sign{font-size:.78rem}
    .letter .gap{height:3px}
    .ipod{left:88%;top:93%;width:22%;height:22%;
      transform:translate(-50%,-50%) rotate(-8deg)}
    .ipod-title{font-size:.55em}
    .ipod-artist{font-size:.45em}
    #sound{right:12px;bottom:12px;width:40px;height:40px}
    #replay{left:12px;bottom:14px;font-size:.7rem}
  }
  @media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;animation-iteration-count:1!important}}
</style>
</head>

<!-- ===================== SCENE ===================== -->
<div id="stage">
  <div class="table-bg" data-depth="6"></div>

  <div class="stage-fit">
    <!-- deep -->
    <div class="layer" data-depth="9" style="width:100%;height:100%">
      <div class="candle-glow"></div>
      <div class="ring-stain" style="left:6%;top:76%;width:9%;height:9%;transform:rotate(8deg)"></div>
    </div>

    <!-- props -->
    <div class="layer" data-depth="15" style="width:100%;height:100%">
      <!-- orchid bouquet -->
      <svg class="sprig" viewBox="0 0 160 200" fill="none">
        <defs>
          <radialGradient id="orcOuter" cx="50%" cy="40%" r="65%">
            <stop offset="0" stop-color="#fdeef4"/>
            <stop offset=".55" stop-color="#d9a8c6"/>
            <stop offset="1" stop-color="#8c5b80"/>
          </radialGradient>
          <radialGradient id="orcInner" cx="50%" cy="42%" r="60%">
            <stop offset="0" stop-color="#fff6fb"/>
            <stop offset=".5" stop-color="#e6b9d6"/>
            <stop offset="1" stop-color="#9a6d8e"/>
          </radialGradient>
          <radialGradient id="orcLip" cx="50%" cy="40%" r="65%">
            <stop offset="0" stop-color="#ffe1c0"/>
            <stop offset=".55" stop-color="#cf8e5e"/>
            <stop offset="1" stop-color="#6a3f24"/>
          </radialGradient>
          <linearGradient id="orcStem" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#7d8a4a"/>
            <stop offset="1" stop-color="#3e4524"/>
          </linearGradient>
          <linearGradient id="orcLeaf" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#5a7340"/>
            <stop offset="1" stop-color="#2f3d20"/>
          </linearGradient>
          <radialGradient id="orcThroat" cx="50%" cy="50%" r="50%">
            <stop offset="0" stop-color="#ffe79a"/>
            <stop offset=".7" stop-color="#c98a3a"/>
            <stop offset="1" stop-color="#6b3f1c"/>

          <!-- single orchid bloom -->

            <!-- outer 3 sepals (top + 2 sides) -->
            <g stroke="#7a4868" stroke-width=".55">
              <ellipse cx="0" cy="-12" rx="6.2" ry="11" fill="url(#orcOuter)"/>
              <g transform="rotate(-130)"><ellipse cx="0" cy="-12" rx="5.8" ry="10.5" fill="url(#orcOuter)"/></g>
              <g transform="rotate(130)"><ellipse cx="0" cy="-12" rx="5.8" ry="10.5" fill="url(#orcOuter)"/></g>
            </g>
            <!-- inner 2 lateral petals -->

            <path d="M-3 10 Q0 13 3 10" stroke="#5a3818" stroke-width=".5" fill="none" opacity=".7"/>

          <!-- small bud -->

            <path d="M-4 4 Q0 0 4 4" stroke="#7a4868" stroke-width=".4" fill="none" opacity=".6"/>
          </g>
        </defs>

        <!-- arching stems -->
        <g stroke="url(#orcStem)" stroke-width="2.4" fill="none" stroke-linecap="round" opacity=".95">
          <path d="M72 200 C70 160 60 120 52 78"/>
          <path d="M76 200 C84 158 96 120 104 78"/>
          <path d="M72 198 C58 168 44 138 36 108"/>

          <path d="M76 198 Q104 188 118 168 Q104 162 86 178 Q78 188 76 198 Z"/>

      <!-- plate + brownies -->

  <div class="w-sub">a coffee table letter</div>
  <p class="w-line">The coffee is still warm and the rain has settled in.
     Someone left a little note here — just for you.</p>
  <button class="open-btn" id="openBtn">Open the letter ☕</button>
  <div class="w-hint">find your seat by the window</div>
</div>

<script>
(function(){
  "use strict";
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  /* ---------- LETTER ---------- */
  const letterLines = [
    {t:"Hey Ladoo,", c:"l-greet", g:true},
    {t:"Maybe one day, when life feels softer,", c:"l-body"},
    {t:"we’ll sit together in a cozy café", c:"l-body"},
    {t:"near a rainy window ☕❤️", c:"l-body", g:true},
    {t:"Not trying to fix each other,", c:"l-body"},
    {t:"just loving each other gently.", c:"l-body", g:true},
    {t:"You talking with your cute expressions", c:"l-body"},
    {t:"while your coffee gets cold,", c:"l-body"},
    {t:"and me secretly admiring you", c:"l-body"},
    {t:"more than the rain outside.", c:"l-body", g:true},
    {t:"And today, I give you the power —", c:"l-body"},
    {t:"to heal slowly, choose freely,", c:"l-body"},
    {t:"and love only when your heart", c:"l-body"},
    {t:"feels safe.", c:"l-body", g:true},
    {t:"Because love should feel like peace,", c:"l-body"},
    {t:"not pressure.", c:"l-body", g:true},
    {t:"Until that café date becomes real,", c:"l-sign"},
    {t:"I’ll keep manifesting warm coffee,", c:"l-sign"},
    {t:"soft music, and us naturally", c:"l-sign"},
    {t:"choosing each other.", c:"l-sign", heart:true},
  ];

  const letterEl = document.getElementById('letter');
  const nibSVG = '<span class="nib"><span class="tip"></span></span>';

  function buildLetter(){
    letterEl.innerHTML = '';
    letterLines.forEach((ln,i)=>{
      const row=document.createElement('div'); row.className='lrow';
      row.style.transform='rotate('+((Math.sin(i*1.7)*1.1)-0.3).toFixed(2)+'deg)';
      const wrap=document.createElement('span'); wrap.className='lwrap';
      const heart=ln.heart?'<svg class="heart-doodle" viewBox="0 0 24 22"><path d="M12 21C-4 11 4 1 12 7 20 1 28 11 12 21Z" fill="none" stroke="#5a2f1a" stroke-width="2" stroke-linecap="round"/></svg>':'';
      wrap.innerHTML='<span class="line '+ln.c+'">'+ln.t+'</span>'+heart+nibSVG;
      row.appendChild(wrap); letterEl.appendChild(row);
      if(ln.g){const gap=document.createElement('div');gap.className='gap';letterEl.appendChild(gap);}
    });
  }
  const speed = t => Math.min(2.6, Math.max(1.2, t.length*0.055));

  function writeLetter(){
    buildLetter();
    const lines=[...letterEl.querySelectorAll('.line')];
    const nibs =[...letterEl.querySelectorAll('.nib')];
    const hearts=[...letterEl.querySelectorAll('.heart-doodle')];
    let delay=0.2;
    lines.forEach((line,i)=>{
      const dur = reduce?0.001:speed(letterLines[i].t);
      line.style.setProperty('--dur',dur+'s'); nibs[i].style.setProperty('--dur',dur+'s');
      setTimeout(()=>{line.classList.add('write');nibs[i].classList.add('go');if(audioOn)tick();}, delay*1000);
      delay+=dur+0.18;
    });
    setTimeout(()=>{hearts.forEach(h=>h.classList.add('show'));revealControls();},(delay+0.3)*1000);
  }

  /* ---------- DUST ---------- */
  (function(){const d=document.getElementById('dust');const N=window.innerWidth<600?16:30;
    for(let i=0;i<N;i++){const m=document.createElement('div');m.className='mote';const s=Math.random()*4+1.5;
      m.style.width=s+'px';m.style.height=s+'px';m.style.left=(Math.random()*100)+'%';m.style.top=(Math.random()*100)+'%';
      m.style.setProperty('--dx',(Math.random()*170+70)+'px');m.style.setProperty('--dy',(-(Math.random()*90+10))+'px');
      m.style.animationDuration=(Math.random()*14+12)+'s';m.style.animationDelay=(-Math.random()*16)+'s';d.appendChild(m);}})();

  /* ---------- WIND-BLOWN LEAVES ---------- */
  (function(){
    const box=document.getElementById('leaves');
    const shapes=[
      '<svg viewBox="0 0 40 40"><path d="M6 34 C2 18 14 4 34 6 C32 26 20 38 6 34 Z" fill="%C1"/><path d="M9 31 C18 22 26 14 31 9" stroke="%C2" stroke-width="1.4" fill="none"/><path d="M16 26 l-5 1 M21 20 l-5 0 M25 15 l-4 -1" stroke="%C2" stroke-width="1" fill="none"/></svg>',
      '<svg viewBox="0 0 40 40"><path d="M20 4 C30 12 30 28 20 36 C10 28 10 12 20 4 Z" fill="%C1"/><path d="M20 5 L20 35" stroke="%C2" stroke-width="1.3"/><path d="M20 14 l7 -4 M20 14 l-7 -4 M20 22 l8 -3 M20 22 l-8 -3" stroke="%C2" stroke-width="1" fill="none"/></svg>',
      '<svg viewBox="0 0 40 40"><path d="M8 32 C6 20 12 8 22 6 C34 10 36 24 30 34 C22 38 14 38 8 32 Z" fill="%C1"/><path d="M12 30 C18 22 24 16 28 10" stroke="%C2" stroke-width="1.3" fill="none"/></svg>'
    ];
    const palettes=[['#a8682e','#6b4220'],['#925227','#5e3618'],['#b87a34','#744826'],['#8a4f24','#512e16'],['#c08a3e','#7a4f28']];
    const N=window.innerWidth<600?8:15;
    for(let i=0;i<N;i++){
      const leaf=document.createElement('div'); leaf.className='leaf';
      const p=palettes[(Math.random()*palettes.length)|0];
      let svg=shapes[(Math.random()*shapes.length)|0].replace(/%C1/g,p[0]).replace(/%C2/g,p[1]);
      leaf.innerHTML='<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">'+svg.replace(/^<svg[^>]*>/,'').replace(/<\/svg>$/,'')+'</svg>';
      const sz=(Math.random()*18+10);
      leaf.style.setProperty('--sz',sz+'px');
      leaf.style.setProperty('--top',(Math.random()*88+2)+'vh');
      leaf.style.setProperty('--dur',(Math.random()*7+7)+'s');
      leaf.style.setProperty('--delay',(-Math.random()*14)+'s');
      leaf.style.setProperty('--op',(Math.random()*0.4+0.55).toFixed(2));
      box.appendChild(leaf);
    }
  })();

  /* ---------- PARALLAX ---------- */
  const layers=[...document.querySelectorAll('[data-depth]')];
  let tx=0,ty=0,cx=0,cy=0;
  window.addEventListener('mousemove',e=>{if(reduce)return;tx=(e.clientX/innerWidth-.5);ty=(e.clientY/innerHeight-.5);});
  (function loop(){cx+=(tx-cx)*0.06;cy+=(ty-cy)*0.06;
    layers.forEach(l=>{const dp=parseFloat(l.getAttribute('data-depth'));const mx=-cx*dp,my=-cy*dp;
      if(l.classList.contains('layer')) l.style.transform='translate(-50%,-50%) translate('+mx+'px,'+my+'px)';
      else l.style.transform='translate('+mx+'px,'+my+'px) scale(1.06)';});
    requestAnimationFrame(loop);})();

  /* ---------- AMBIENCE (rain + wind) + song ---------- */
  let actx=null,master=null,audioOn=false;
  const bgsong=document.getElementById('bgsong');
  bgsong.volume=0;
  function initAudio(){
    if(actx)return;const AC=window.AudioContext||window.webkitAudioContext;actx=new AC();
    master=actx.createGain();master.gain.value=0;master.connect(actx.destination);
    const n=actx.sampleRate*2,buf=actx.createBuffer(1,n,actx.sampleRate),dt=buf.getChannelData(0);
    for(let i=0;i<n;i++)dt[i]=(Math.random()*2-1)*0.5;
    const rain=actx.createBufferSource();rain.buffer=buf;rain.loop=true;
    const lp=actx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=850;
    const rg=actx.createGain();rg.gain.value=0.03;rain.connect(lp);lp.connect(rg);rg.connect(master);rain.start();
    // gusting wind: same noise through a sweeping bandpass
    const wind=actx.createBufferSource();wind.buffer=buf;wind.loop=true;
    const bp=actx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=480;bp.Q.value=0.7;
    const wg=actx.createGain();wg.gain.value=0.012;wind.connect(bp);bp.connect(wg);wg.connect(master);wind.start();
    setInterval(()=>{if(!actx||!audioOn)return;const t=actx.currentTime,d=2+Math.random()*3;
      wg.gain.cancelScheduledValues(t);wg.gain.setTargetAtTime(0.012+Math.random()*0.04,t,0.5);
      wg.gain.setTargetAtTime(0.012,t+d,0.8);
      bp.frequency.cancelScheduledValues(t);bp.frequency.setTargetAtTime(380+Math.random()*420,t,0.6);},3800);
  }
  function fadeMaster(v){if(master){master.gain.cancelScheduledValues(actx.currentTime);master.gain.setTargetAtTime(v,actx.currentTime,0.6);}}
  function fadeSong(target){
    const start=bgsong.volume,t0=performance.now(),dur=900;
    function step(t){const k=Math.min(1,(t-t0)/dur);bgsong.volume=start+(target-start)*k;if(k<1)requestAnimationFrame(step);}
    requestAnimationFrame(step);
  }
  function tick(){if(!actx||!audioOn)return;const o=actx.createOscillator();o.type='sine';o.frequency.value=2400+Math.random()*400;
    const g=actx.createGain();g.gain.value=0;o.connect(g);g.connect(master);const t=actx.currentTime;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.02,t+0.005);g.gain.exponentialRampToValueAtTime(0.0005,t+0.12);o.start(t);o.stop(t+0.13);}

  const soundBtn=document.getElementById('sound'),soundIcon=document.getElementById('soundIcon');
  function setAudio(on){audioOn=on;
    if(on){initAudio();if(actx.state==='suspended')actx.resume();fadeMaster(0.9);
      const p=bgsong.play();if(p&&p.catch)p.catch(()=>{});fadeSong(0.85);
      soundIcon.innerHTML='<path d="M4 9v6h4l5 4V5L8 9H4z"/><path d="M16 8.5a4 4 0 0 1 0 7"/><path d="M18.5 6a7 7 0 0 1 0 12"/>';}
    else{fadeMaster(0);fadeSong(0);setTimeout(()=>{try{bgsong.pause();}catch(e){}},950);
      soundIcon.innerHTML='<path d="M4 9v6h4l5 4V5L8 9H4z"/><line x1="16" y1="9" x2="21" y2="15"/><line x1="21" y1="9" x2="16" y2="15"/>';}}
  soundBtn.addEventListener('click',()=>setAudio(!audioOn));

  /* ---------- OPEN FLOW ---------- */
  const welcome=document.getElementById('welcome'),openBtn=document.getElementById('openBtn'),steam=document.getElementById('steam');
  let opened=false;
  function openLetter(){if(opened)return;opened=true;setAudio(true);
    welcome.classList.add('hide');setTimeout(()=>welcome.style.display='none',1600);
    setTimeout(()=>steam.classList.add('on'),600);setTimeout(writeLetter,1500);}
  openBtn.addEventListener('click',openLetter);
  function revealControls(){soundBtn.classList.add('show');document.getElementById('replay').classList.add('show');}
  document.getElementById('replay').addEventListener('click',writeLetter);
})();
</script>
